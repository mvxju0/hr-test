<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body data-page="front.html">
  <div class="app">
    <main class="main">
      <section class="hero banner">
        <h3 id="hello"></h3>
        <p id="today"></p>
        <p>공지: 2026년 4월 온오프 기준 및 승인 플로우가 업데이트되었습니다.</p>
      </section>

      <section class="card-grid kpi-grid">
        <article class="card kpi-card"><h3>총 직원 수</h3><div class="num" id="empCount"></div></article>
        <article class="card kpi-card"><h3>승인 대기 건수</h3><div class="num" id="pendingCount"></div></article>
        <article class="card kpi-card"><h3>총 매장 수</h3><div class="num" id="storeCount"></div></article>
        <article class="card kpi-card"><h3>금일 오픈지연</h3><div class="num" id="delayCount">0</div></article>
      </section>

      <section class="dashboard-grid">
        <div class="panel">
          <h3>오늘의 운영 요약</h3>
          <p class="muted">실시간 느낌의 시연용 KPI 카드</p>
          <div class="quick" id="quickCards"></div>
        </div>
        <div class="panel">
          <h3>운영 현황 미니 차트</h3>
          <div id="miniChart" class="mini-chart"></div>
        </div>
      </section>

      <section class="panel compact-table">
        <h3>최근 승인 요청</h3>
        <div class="table-wrap">
          <table>
            <thead><tr><th>구분</th><th>대상</th><th>요청 내용</th><th>요청자</th><th>상태</th></tr></thead>
            <tbody id="recentApv"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/data/dummy.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
