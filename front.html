<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
<div id="app"></div>
<script src="assets/data/dummy-data.js"></script>
<script src="assets/js/common.js"></script>
<script>
  const { DATA, layoutInit, getRole } = HR_COMMON;
  layoutInit('front', '대시보드');
  const pending = DATA.approvalHub.signup.length + DATA.approvalHub.employeeEdit.length + DATA.approvalHub.storeEdit.length
    + JSON.parse(localStorage.getItem('approval_employee_edit') || '[]').length
    + JSON.parse(localStorage.getItem('approval_store_edit') || '[]').length;
  document.getElementById('pageContent').innerHTML = `
    <p style="margin:12px 0 6px;">${getRole()}님, 오늘도 안정적인 운영을 시작합니다.</p>
    <p class="small">${DATA.getToday()}</p>
    <div class="notice">공지: 개인정보 열람은 담당/팀장에게만 허용되며, 수정은 승인 이후 반영됩니다.</div>
    <div class="card-grid">
      <article class="card"><h3>총 직원 수</h3><p class="value">${DATA.employees.length}명</p></article>
      <article class="card"><h3>승인 대기 건수</h3><p class="value">${pending}건</p></article>
      <article class="card"><h3>총 매장 수</h3><p class="value">${DATA.stores.length}개</p></article>
    </div>
    <section class="section card">
      <h3 style="margin-top:0">권한 기반 확장 영역</h3>
      <p style="margin:0">현재 권한 <strong>${getRole()}</strong>에 맞춰 메뉴/데이터 확장이 가능하도록 공통 구조를 적용했습니다.</p>
    </section>`;
</script>
</body></html>
