<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원관리</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body data-page="employee.html">
  <div class="app">
    <main class="main">
      <section class="panel search-panel">
        <div class="search-title">직원 빠른 검색</div>
        <div class="row toolbar">
          <input id="q" placeholder="이름/매장명 검색" />
          <select id="storeFilter"><option value="">전체 매장</option></select>
          <select id="roleFilter"><option value="">전체 직급</option><option>플래너</option><option>점장</option></select>
        </div>
      </section>

      <section class="panel compact-table table-wrap employee-table">
        <table>
          <thead>
            <tr><th>이름</th><th>매장</th><th>연락처</th><th>전화하기</th><th>편집</th></tr>
          </thead>
          <tbody id="empBody"></tbody>
        </table>
      </section>

      <section class="panel" id="detail">직원을 선택하면 공개정보/개인정보 권한/변경 히스토리가 표시됩니다.</section>
    </main>
  </div>
  <script src="assets/data/dummy.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
