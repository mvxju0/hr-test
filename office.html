<!doctype html>
<html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>사무실</title><link rel="stylesheet" href="assets/css/common.css" /></head>
<body><div id="app"></div>
<script src="assets/data/dummy-data.js"></script><script src="assets/js/common.js"></script>
<script>
const { DATA, layoutInit } = HR_COMMON;
layoutInit('office', '사무실');
document.getElementById('pageContent').innerHTML = `
<section class="card"><h3 style="margin-top:0">사무실 인력</h3>
<div class="table-wrap"><table><thead><tr><th>이름</th><th>직급</th><th>업무 분장</th><th>작업 목록</th><th>상태</th></tr></thead>
<tbody>${DATA.officeStaff.map((o,idx)=>`<tr><td>${o.name}</td><td>${o.role}</td><td>${o.duty}</td><td>Task-${idx+1}: ${o.duty} 관련 점검</td><td>${o.status}</td></tr>`).join('')}</tbody></table></div>
</section>
<div class="card-grid">
  <article class="card"><h3>진행중</h3><p class="value">${DATA.officeStaff.filter(v=>v.status==='진행중').length}건</p></article>
  <article class="card"><h3>검토중</h3><p class="value">${DATA.officeStaff.filter(v=>v.status==='검토중').length}건</p></article>
  <article class="card"><h3>완료</h3><p class="value">${DATA.officeStaff.filter(v=>v.status==='완료').length}건</p></article>
</div>`;
</script></body></html>
