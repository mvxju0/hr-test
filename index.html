<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR 시스템 로그인</title>
  <link rel="stylesheet" href="assets/css/common.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-box" id="loginForm">
      <h2>HR / 운영관리 시스템</h2>
      <p class="sub">실개발 전 시연용 목업 로그인</p>
      <label>아이디</label><input required value="demo.admin" />
      <label>비밀번호</label><input type="password" required value="1234" />
      <label>권한 선택</label>
      <select id="role">
        <option>플래너</option><option>점장</option><option>팀장</option><option>담당</option><option>사무실</option>
      </select>
      <button class="primary" style="width:100%;margin-top:12px">로그인</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      localStorage.setItem('role', document.getElementById('role').value);
      location.href = 'front.html';
    });
  </script>
</body>
</html>
